name: journey_9_1_registration
prd_ref: "§9.1"
category: journey
description: "New técnico DMs Toño, registers with minimum fields (nombre, ciudad, especialidades, modalidad), gets greeted with matching OTs immediately after."
db_fixtures:
  - tecnico_not_registered
  - open_ot_bogota_electrico

user_utterances:
  - "hola, quiero trabajar con redin"
  - "soy Juan Rodríguez, vivo en Bogotá, soy eléctrico"
  - "trabajo solo"
  - "prestación de servicios está bien"

expected_tool_calls:
  - tool: identify_user
    must_be_first: true
  - tool: register_tecnico
    args_contain:
      nombre: "Juan"
      ciudad: "Bogotá"
      especialidades: ["eléctrico"]
  - tool: read_pending_ots

expected_assertions:
  - response_does_not_contain_cedula: true
  - response_contains: "Bogotá"
  - response_does_not_contain: "¿excelente"
