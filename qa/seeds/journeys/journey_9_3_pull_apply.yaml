name: journey_9_3_pull_apply
prd_ref: "§9.3"
category: journey
description: "Registered técnico proactively asks for available work, Toño shows matching OTs, técnico selects one and applies."
db_fixtures:
  - tecnico_registered_cali_plomero
  - open_ot_cali_plomero

user_utterances:
  - "hola Toño, ¿hay trabajo?"
  - "¿qué hay en plomería?"
  - "dame el primero, me postulo"

expected_tool_calls:
  - tool: identify_user
    must_be_first: true
  - tool: read_pending_ots
  - tool: create_postulacion

expected_assertions:
  - response_does_not_contain_cedula: true
  - response_contains: "postulación"
